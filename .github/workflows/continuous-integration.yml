name: Continuous Integration

on: push

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24, 25]
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v5

      - name: 💚 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🔎 Typecheck code
        run: pnpm typecheck

      - name: 🔎 Lint code
        run: pnpm lint

      - name: 🚀 Build code
        run: pnpm build

      - name: 📦 Bundle app
        if: ${{ matrix.node-version == 24 }}
        run: pnpm bundle
